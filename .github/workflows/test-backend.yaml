name: Test Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: $(cat .python-version)

      - name: Install dependencies
        run: uv sync

      - name: Unit Testing with pytest
        run: uv run pytest tests
